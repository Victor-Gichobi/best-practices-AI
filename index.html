<!-- AFTER CODE --> 

<!DOCTYPE html>
<html>
<head>
<style>
  .pricing {
    width: 300px;
    margin: auto;
    background-color: #fff;
    box-shadow: 0 0 10px #ccc;
    padding: 10px;
    text-align: left;
  }

  .title {
    font-size: 22px;
    font-weight: bold;
  }

  .price {
    font-size: 18px;
    color: green;
  }

  .features {
    list-style: none;
    padding-left: 0;
  }

  .features li {
    padding: 4px;
    border-bottom: 1px solid #eee;
  }

  .btn {
    background: blue;
    color: white;
    padding: 10px 20px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
  }

  .btn:hover {
    background: darkblue;
  }
</style>
</head>
<body>
  <div id="app"></div>

  <script>
    function Card({ title, price, features, buttonText = "Start Trial", onClick }) {
      const card = document.createElement("div");
      card.className = "pricing";

      const heading = document.createElement("h2");
      heading.className = "title";
      heading.textContent = title;

      const priceEl = document.createElement("p");
      priceEl.className = "price";
      priceEl.textContent = price;

      const list = document.createElement("ul");
      list.className = "features";
      features.forEach((feature) => {
        const li = document.createElement("li");
        li.textContent = feature;
        list.appendChild(li);
      });

      const button = document.createElement("button");
      button.className = "btn";
      button.textContent = buttonText;
      if (onClick) button.addEventListener("click", onClick);

      card.append(heading, priceEl, list, button);
      return card;
    }

    // Usage
    const basicPlan = Card({
      title: "Basic Plan",
      price: "$9.99 /month",
      features: ["1 GB Storage", "Basic Support", "All Core Features"],
      onClick: () => alert("Starting Basic trial"),
    });

    const proPlan = Card({
      title: "Pro Plan",
      price: "$19.99 /month",
      features: ["10 GB Storage", "Priority Support", "All Core Features"],
      onClick: () => alert("Starting Pro trial"),
    });

    document.getElementById("app").append(basicPlan, proPlan);
  </script>
</body>
</html>
